name: 'Release - Multi Platform Build'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS-ARM64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux-x64'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          owner: 1837620622
          repo: windsurf-account-manager-releases
          tagName: v__VERSION__
          releaseName: 'Windsurf Account Manager v__VERSION__'
          releaseBody: |
            ## Windsurf Account Manager (CK 二次开发版) v__VERSION__

            ### 更新内容

            - 新增欢迎门户页：启动软件后需输入访问口令 `cknb` 进入主界面
            - 修复新账号无法导入和登录的问题
            - macOS 兼容性优化

            ### 下载说明

            | 平台 | 文件 | 适用架构 |
            |------|------|----------|
            | Windows | `*_x64-setup.exe` | Intel/AMD x64 |
            | Windows | `*_arm64-setup.exe` | ARM64 |
            | macOS | `*_aarch64.dmg` | Apple Silicon M1/M2/M3/M4 |
            | macOS | `*_x64.dmg` | Intel Mac |
            | Linux | `*_amd64.deb` | Ubuntu/Debian |
            | Linux | `*_amd64.AppImage` | 通用 |

            ---
            二次开发者：传康Kk | 微信：1837620622 | 咸鱼/B站：万能程序员
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
