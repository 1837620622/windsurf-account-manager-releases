name: 'Release - Multi Platform Build'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ============================================================
  # 阶段一：各平台并行构建，上传产物
  # ============================================================
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS-ARM64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux-x64'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      # 仅构建，不创建 Release（不传 tagName）
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # 收集构建产物并上传
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: error

  # ============================================================
  # 阶段二：汇总所有产物，发布到公仓
  # ============================================================
  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find all-artifacts -type f | head -50

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: 1837620622/windsurf-account-manager-releases
          tag_name: ${{ steps.version.outputs.tag }}
          name: 'Windsurf Account Manager ${{ steps.version.outputs.tag }}'
          body: |
            ## Windsurf Account Manager (CK 二次开发版) ${{ steps.version.outputs.tag }}

            ### 更新内容

            - 修复账号多时JSON数据损坏(trailing characters)导致启动失败的问题
            - 添加写入互斥锁防止并发写入文件竞态
            - 增强数据文件损坏时的自动修复能力（智能截断+备份恢复）
            - 修复自动更新检测功能（版本号解析错误）
            - 门户页UI重构为赛博科技风格 + 修复6项前端问题
            - 新增启动时自动检测更新功能
            - macOS/Windows/Linux 全平台兼容

            ### 下载说明

            | 平台 | 文件 | 适用架构 |
            |------|------|----------|
            | Windows | `*_x64-setup.exe` | Intel/AMD x64 |
            | Windows | `*_x64_zh-CN.msi` | Intel/AMD x64 |
            | macOS | `*_aarch64.dmg` | Apple Silicon M1/M2/M3/M4 |
            | macOS | `*_x64.dmg` | Intel Mac |
            | Linux | `*_amd64.deb` | Ubuntu/Debian |
            | Linux | `*_amd64.AppImage` | 通用 |

            ---
            二次开发者：传康Kk | 微信：1837620622 | 咸鱼/B站：万能程序员
          files: all-artifacts/**/*
          token: ${{ secrets.RELEASE_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
